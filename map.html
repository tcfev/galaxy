<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCF Galaxy — Concept Map</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #b8ccc5;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #g {
      display: block;
      width: 100vw; height: 100vh;
      cursor: default;
      background: #b8ccc5;
    }

    /* ── Node styles ──────────────────────────────────────────── */
    .node-rect {
      fill: white;
      stroke: #8fa89f;
      stroke-width: 1px;
      filter: url(#node-shadow);
      cursor: pointer;
      transition: stroke 0.15s, stroke-width 0.15s;
      rx: 6;
    }
    .node-g:hover .node-rect,
    .node-rect.hovered { stroke: #3a4f47; stroke-width: 1.5px; }
    .node-rect.selected { stroke: #1e3028; stroke-width: 2px; }
    .node-rect.dimmed { opacity: 0.25; }

    .node-label {
      font-family: 'Inter', sans-serif;
      font-size: 11.5px;
      font-weight: 500;
      fill: #1c2e26;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }
    .node-label.dimmed { opacity: 0.25; }

    /* ── Edge styles ──────────────────────────────────────────── */
    .edge-line {
      fill: none;
      stroke: #7a9890;
      stroke-width: 1px;
    }
    .edge-line.highlighted { stroke: #2e4438; stroke-width: 1.5px; }
    .edge-line.dimmed { opacity: 0.1; }

    .edge-label {
      font-family: 'Inter', sans-serif;
      font-size: 8.5px;
      font-style: italic;
      fill: #5e7a70;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
    }
    .edge-label.dimmed { opacity: 0.1; }

    /* ── Group region styles ──────────────────────────────────── */
    .group-rect {
      fill: rgba(255,255,255,0.14);
      stroke: #7a9890;
      stroke-width: 0.8px;
      stroke-dasharray: 6,4;
    }
    .group-label {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 500;
      fill: #618070;
      letter-spacing: 0.04em;
    }

    /* ── Panel ─────────────────────────────────────────────────── */
    #panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: 360px; max-width: 90vw;
      background: rgba(175,194,188,0.97);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(100,140,128,0.3);
      z-index: 20;
      transform: translateX(100%);
      transition: transform 0.48s cubic-bezier(0.4,0,0.2,1);
      overflow-y: auto;
    }
    #panel.open {
      transform: translateX(0);
      box-shadow: -16px 0 50px rgba(0,0,0,0.15);
    }

    #panel-accent { height: 3px; }
    #panel-inner { padding: 0 24px 48px; }

    #panel-head {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding-top: 20px; margin-bottom: 14px;
    }
    #panel-close {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(0,0,0,0.08); border: none;
      color: rgba(0,0,0,0.45); font-size: 12px;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0;
      font-family: inherit;
      transition: background 0.2s;
    }
    #panel-close:hover { background: rgba(0,0,0,0.15); color: rgba(0,0,0,0.8); }

    #panel-badge {
      display: inline-flex; align-items: center;
      padding: 2px 10px; border-radius: 20px;
      border: 1px solid; font-size: 9px;
      font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #panel-title {
      font-size: 24px; font-weight: 700;
      color: #1a2e22; margin-top: 10px; line-height: 1.2;
    }
    #panel-fullname { font-size: 11px; color: rgba(26,46,34,0.5); margin-top: 4px; }
    #panel-tagline {
      font-size: 13px; color: rgba(26,46,34,0.8);
      font-style: italic; line-height: 1.55;
      margin-top: 14px; padding-top: 14px;
      border-top: 1px solid rgba(0,0,0,0.09);
    }
    #panel-description {
      font-size: 12.5px; color: rgba(26,46,34,0.6);
      line-height: 1.75; margin-top: 12px;
    }
    #panel-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .panel-link {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 6px; border: 1px solid;
      font-size: 12px; font-weight: 500; text-decoration: none;
      transition: background 0.18s;
    }
    .panel-link:hover { background: rgba(0,0,0,0.07); }

    #panel-related { margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(0,0,0,0.09); }
    #panel-related-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: rgba(26,46,34,0.35);
      margin-bottom: 9px;
    }
    #panel-related-list { display: flex; flex-wrap: wrap; gap: 7px; }
    .related-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 6px; border: 1px solid;
      background: transparent; font-size: 11.5px; font-family: inherit;
      cursor: pointer; color: #1a2e22;
      transition: background 0.18s;
    }
    .related-chip:hover { background: rgba(0,0,0,0.07); }
    .chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* ── Topbar ──────────────────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 10; display: flex; align-items: center;
      gap: 16px; padding: 12px 20px; pointer-events: none;
    }
    #logo { display: flex; align-items: center; gap: 9px; pointer-events: all; }
    #logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #2e6050; }
    #logo-text { font-size: 13px; font-weight: 600; color: #1a3028; }
    #logo-sub { font-size: 10px; color: rgba(26,48,40,0.45); }

    #nav-links {
      display: flex; gap: 3px;
      background: rgba(155,180,172,0.75);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 6px;
      padding: 4px;
      pointer-events: all;
    }
    .design-pill {
      padding: 5px 14px; border-radius: 4px; border: none;
      background: transparent; color: rgba(26,48,40,0.55);
      font-size: 12px; font-family: inherit;
      cursor: pointer; transition: all 0.18s;
    }
    .design-pill:hover { color: #1a3028; background: rgba(255,255,255,0.22); }
    .design-pill.active { background: rgba(255,255,255,0.62); color: #1a2e22; font-weight: 600; }

    /* ── Guide box (top-right, like reference image) ─────────── */
    #guide {
      position: fixed; top: 14px; right: 18px;
      z-index: 10; pointer-events: none;
      background: white; border: 1px solid #a0b8b0;
      border-radius: 5px; padding: 7px 10px;
      font-size: 9.5px; line-height: 1.7;
    }
    #guide strong { font-weight: 600; color: #1a2e22; }
    #guide span { color: #5e7a70; font-style: italic; }
    .guide-arrow {
      display: flex; align-items: center; gap: 5px; margin-top: 2px;
    }
    .guide-box {
      display: inline-block; border: 1px solid #8fa89f;
      border-radius: 3px; padding: 1px 5px;
      font-size: 9px; color: #1c2e26; background: white;
    }
    .guide-line { width: 24px; height: 1px; background: #7a9890; position: relative; display: flex; align-items: center; justify-content: flex-end; }
    .guide-line::after { content: '▶'; font-size: 6px; color: #7a9890; position: absolute; right: -1px; }

    /* ── Hint ─────────────────────────────────────────────────── */
    #hint {
      position: fixed; bottom: 18px; left: 50%;
      transform: translateX(-50%); z-index: 5;
      font-size: 11px; color: rgba(26,48,40,0.38);
      pointer-events: none; text-align: center;
      transition: opacity 0.8s;
    }

    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }

    @media (max-width: 700px) {
      #panel {
        width: 100%; top: auto; height: 65vh;
        border-left: none;
        border-top: 1px solid rgba(100,140,128,0.3);
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
      }
      #panel.open { transform: translateY(0); }
      #guide { display: none; }
    }
  </style>
</head>
<body>

  <svg id="g" xmlns="http://www.w3.org/2000/svg"></svg>

  <!-- Panel -->
  <aside id="panel" aria-hidden="true">
    <div id="panel-accent"></div>
    <div id="panel-inner">
      <div id="panel-head">
        <div id="panel-badge"></div>
        <button id="panel-close">✕</button>
      </div>
      <h2 id="panel-title"></h2>
      <p id="panel-fullname"></p>
      <p id="panel-tagline"></p>
      <p id="panel-description"></p>
      <div id="panel-links"></div>
      <div id="panel-related">
        <div id="panel-related-label">Connected to</div>
        <div id="panel-related-list"></div>
      </div>
    </div>
  </aside>

  <!-- Topbar -->
  <header id="topbar">
    <div id="logo">
      <span id="logo-dot"></span>
      <div>
        <div id="logo-text">TCF Galaxy</div>
        <div id="logo-sub">concept map</div>
      </div>
    </div>
    <nav id="nav-links">
      <button class="design-pill" onclick="location.href='index.html'">Galaxy</button>
      <button class="design-pill" onclick="location.href='circuit.html'">Circuit</button>
      <button class="design-pill" onclick="location.href='voronoi.html'">Voronoi</button>
      <button class="design-pill active">Map</button>
    </nav>
  </header>

  <!-- Guide (top-right reference legend) -->
  <div id="guide">
    <strong>Guide:</strong><br/>
    <span>TCF develops Jomhoor.</span>
    <div class="guide-arrow">
      <div class="guide-box">TCF</div>
      <div style="display:flex;align-items:center;gap:3px;color:#5e7a70;font-size:8px;font-style:italic">
        &nbsp;develops&nbsp;
        <div class="guide-line"></div>
      </div>
      <div class="guide-box">Jomhoor</div>
    </div>
  </div>

  <div id="hint">hover a node to trace connections · click to inspect</div>

  <script src="data.js"></script>
  <script>
  'use strict';
  (function () {

    /* ── Relationship labels for each directed edge ──────────── */
    const EDGE_LABELS = {
      'tcf→dfii':              'partners with',
      'tcf→jomhoor':           'develops',
      'tcf→atlas':             'operates',
      'tcf→university':        'supports',
      'jomhoor→dfii':          'aligns with',
      'jomhoor→wallet':        'includes',
      'jomhoor→iranians-vote': 'powers',
      'jomhoor→taraaz':        'enables',
      'jomhoor→compass':       'enables',
      'jomhoor→sso':           'provides',
      'jomhoor→inid':          'integrates',
      'sso→taraaz':            'authenticates',
      'sso→compass':           'authenticates',
      'sso→difcongress':       'authenticates',
      'inid→iranians-vote':    'verifies for',
      'wallet→iranians-vote':  'signs for',
      'taraaz→normalcy':       'gates content via',
    };

    /* ── Fixed SVG layout positions (viewBox coords) ─────────── */
    const svg = document.getElementById('g');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    const POS = {
      'tcf':           { x: 145, y: 330 },
      'dfii':          { x: 340, y: 100 },
      'jomhoor':       { x: 430, y: 330 },
      'wallet':        { x: 640, y: 185 },
      'sso':           { x: 640, y: 330 },
      'inid':          { x: 640, y: 485 },
      'taraaz':        { x: 870, y: 168 },
      'compass':       { x: 870, y: 296 },
      'difcongress':   { x: 870, y: 424 },
      'iranians-vote': { x: 870, y: 552 },
      'atlas':         { x: 145, y: 480 },
      'university':    { x: 145, y: 408 },
      'normalcy':      { x: 1065, y: 168 },
    };

    /* ── Node box half-dimensions (px in viewBox space) ─────── */
    const DIM = {
      'tcf':           { hw: 30,  hh: 15 },
      'dfii':          { hw: 30,  hh: 15 },
      'jomhoor':       { hw: 42,  hh: 15 },
      'wallet':        { hw: 58,  hh: 15 },
      'sso':           { hw: 48,  hh: 15 },
      'inid':          { hw: 40,  hh: 15 },
      'taraaz':        { hw: 35,  hh: 15 },
      'compass':       { hw: 52,  hh: 15 },
      'difcongress':   { hw: 52,  hh: 15 },
      'iranians-vote': { hw: 55,  hh: 15 },
      'atlas':         { hw: 44,  hh: 15 },
      'university':    { hw: 64,  hh: 15 },
      'normalcy':      { hw: 42,  hh: 15 },
    };

    // Compute tight content bounds from nodes
    const PAD = 75;
    let bMinX = Infinity, bMinY = Infinity, bMaxX = -Infinity, bMaxY = -Infinity;
    for (const [id, p] of Object.entries(POS)) {
      const d = DIM[id];
      bMinX = Math.min(bMinX, p.x - d.hw);
      bMaxX = Math.max(bMaxX, p.x + d.hw);
      bMinY = Math.min(bMinY, p.y - d.hh);
      bMaxY = Math.max(bMaxY, p.y + d.hh);
    }
    const CX = bMinX - PAD, CY = bMinY - PAD;
    const CW = (bMaxX - bMinX) + PAD * 2, CH = (bMaxY - bMinY) + PAD * 2;

    // Dynamic viewBox: fills any screen shape, graph always centered
    function fitViewBox() {
      const sw = window.innerWidth, sh = window.innerHeight;
      const contentAR = CW / CH;
      const screenAR  = sw / sh;
      if (screenAR >= contentAR) {
        // Screen wider: extend left/right
        const newVW = CH * screenAR;
        const ox = (newVW - CW) / 2;
        svg.setAttribute('viewBox', `${CX - ox} ${CY} ${newVW} ${CH}`);
      } else {
        // Screen taller: extend top/bottom
        const newVH = CW / screenAR;
        const oy = (newVH - CH) / 2;
        svg.setAttribute('viewBox', `${CX} ${CY - oy} ${CW} ${newVH}`);
      }
    }
    fitViewBox();
    window.addEventListener('resize', fitViewBox);

    /* ── State ─────────────────────────────────────────────────── */
    let selectedId = null;
    let hoveredId  = null;

    /* ── SVG namespace helper ──────────────────────────────────── */
    const NS = 'http://www.w3.org/2000/svg';
    function svgEl(tag, attrs = {}) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    /* ── Defs: shadow filter + arrow markers ───────────────────── */
    const defs = svgEl('defs');

    const flt = svgEl('filter', { id: 'node-shadow', x: '-15%', y: '-20%', width: '130%', height: '140%' });
    flt.appendChild(svgEl('feDropShadow', { dx: '0', dy: '1.5', stdDeviation: '2.5', 'flood-color': 'rgba(0,0,0,0.13)' }));
    defs.appendChild(flt);

    // Default arrow
    function makeArrow(id, fillColor) {
      const m = svgEl('marker', { id, markerWidth: '7', markerHeight: '7', refX: '5.5', refY: '3.5', orient: 'auto' });
      m.appendChild(svgEl('path', { d: 'M0,0.5 L0,6.5 L6,3.5 Z', fill: fillColor }));
      return m;
    }
    defs.appendChild(makeArrow('arr',     '#7a9890'));
    defs.appendChild(makeArrow('arr-hi',  '#2e4438'));
    defs.appendChild(makeArrow('arr-dim', 'rgba(122,152,144,0.15)'));
    svg.appendChild(defs);

    /* ── Group region layer ─────────────────────────────────────── */
    const groupLayer = svgEl('g');

    // Jomhoor platform background (wallet, sso, inid columns)
    const platformRect = svgEl('rect', {
      class: 'group-rect',
      x: 576, y: 152, width: 148, height: 365, rx: 9,
    });
    const platformLabel = svgEl('text', { class: 'group-label', x: 586, y: 168 });
    platformLabel.textContent = 'Platform Components';
    groupLayer.appendChild(platformRect);
    groupLayer.appendChild(platformLabel);

    // Democracy tools background (taraaz, compass, difcongress, iranians-vote)
    const democRect = svgEl('rect', {
      class: 'group-rect',
      x: 812, y: 135, width: 116, height: 450, rx: 9,
    });
    const democLabel = svgEl('text', { class: 'group-label', x: 822, y: 152 });
    democLabel.textContent = 'Democracy Tools';
    groupLayer.appendChild(democRect);
    groupLayer.appendChild(democLabel);

    // TCF community nodes (left column)
    const commRect = svgEl('rect', {
      class: 'group-rect',
      x: 72, y: 285, width: 148, height: 230, rx: 9,
    });
    const commLabel = svgEl('text', { class: 'group-label', x: 82, y: 302 });
    commLabel.textContent = 'Civil Society';
    groupLayer.appendChild(commRect);
    groupLayer.appendChild(commLabel);

    svg.appendChild(groupLayer);

    /* ── Edge layer ─────────────────────────────────────────────── */
    const edgeLayer = svgEl('g');
    svg.appendChild(edgeLayer);

    /* ── Node layer ─────────────────────────────────────────────── */
    const nodeLayer = svgEl('g');
    svg.appendChild(nodeLayer);

    /* ── Connected-node lookup ─────────────────────────────────── */
    function connectedIds(id) {
      const s = new Set();
      TCF_DATA.links.forEach(l => {
        if (l.source === id) s.add(l.target);
        if (l.target === id) s.add(l.source);
      });
      return s;
    }

    /* ── Clip line endpoint to rect border ─────────────────────── */
    function clipEnd(fx, fy, tx, ty, hw, hh) {
      const pad = 6;
      const hw2 = hw + pad, hh2 = hh + pad;
      const dx = tx - fx, dy = ty - fy;
      const dist = Math.hypot(dx, dy);
      if (dist === 0) return { x: tx, y: ty };
      const ux = dx / dist, uy = dy / dist;
      const tx1 = Math.abs(ux) > 1e-9 ? hw2 / Math.abs(ux) : Infinity;
      const ty1 = Math.abs(uy) > 1e-9 ? hh2 / Math.abs(uy) : Infinity;
      const t = Math.min(tx1, ty1);
      return { x: tx - ux * t, y: ty - uy * t };
    }

    /* ── Build edges ──────────────────────────────────────────── */
    const edgePaths  = {};
    const edgeLabels = {};

    TCF_DATA.links.forEach(link => {
      const sp = POS[link.source], tp = POS[link.target];
      const sd = DIM[link.source], td = DIM[link.target];
      if (!sp || !tp) return;

      const from = clipEnd(tp.x, tp.y, sp.x, sp.y, sd.hw, sd.hh);
      const to   = clipEnd(sp.x, sp.y, tp.x, tp.y, td.hw, td.hh);
      const key  = `${link.source}→${link.target}`;

      const line = svgEl('line', {
        class: 'edge-line',
        x1: from.x, y1: from.y,
        x2: to.x,   y2: to.y,
        'marker-end': 'url(#arr)',
        'data-src': link.source,
        'data-tgt': link.target,
      });
      edgeLayer.appendChild(line);
      edgePaths[key] = line;

      // Label at 45% along the edge, offset perpendicularly
      const lbl = EDGE_LABELS[key];
      if (lbl) {
        const mx = from.x + (to.x - from.x) * 0.45;
        const my = from.y + (to.y - from.y) * 0.45;
        const edx = to.x - from.x, edy = to.y - from.y;
        const elen = Math.hypot(edx, edy);
        const perpX = elen > 0 ? -edy / elen * 9 : 0;
        const perpY = elen > 0 ?  edx / elen * 9 : 0;

        const txt = svgEl('text', {
          class: 'edge-label',
          x: mx + perpX, y: my + perpY,
        });
        txt.textContent = lbl;
        edgeLayer.appendChild(txt);
        edgeLabels[key] = txt;
      }
    });

    /* ── Build nodes ──────────────────────────────────────────── */
    const nodeRects  = {};
    const nodeLabels = {};

    TCF_DATA.nodes.forEach(node => {
      const p = POS[node.id];
      const d = DIM[node.id];
      if (!p) return;

      const g = svgEl('g', { class: 'node-g', 'data-id': node.id });

      const rect = svgEl('rect', {
        class: 'node-rect',
        x: p.x - d.hw, y: p.y - d.hh,
        width: d.hw * 2, height: d.hh * 2,
        rx: 6,
      });

      const label = svgEl('text', { class: 'node-label', x: p.x, y: p.y });
      label.textContent = node.label;

      g.appendChild(rect);
      g.appendChild(label);
      nodeLayer.appendChild(g);

      nodeRects[node.id]  = rect;
      nodeLabels[node.id] = label;

      g.addEventListener('click', e => { e.stopPropagation(); onSelect(node); });
      g.addEventListener('mouseenter', () => { hoveredId = node.id; render(); });
      g.addEventListener('mouseleave', () => { if (hoveredId === node.id) { hoveredId = null; render(); } });
    });

    /* ── Render: apply highlight/dim classes ──────────────────── */
    function render() {
      const active = selectedId || hoveredId;
      const conn   = active ? connectedIds(active) : null;

      TCF_DATA.nodes.forEach(n => {
        const r = nodeRects[n.id];
        const l = nodeLabels[n.id];
        if (!r) return;
        const isActive = !active || n.id === active || conn.has(n.id);
        r.classList.toggle('dimmed',   !isActive);
        r.classList.toggle('selected', n.id === selectedId);
        r.classList.toggle('hovered',  n.id === hoveredId && n.id !== selectedId);
        l.classList.toggle('dimmed',   !isActive);
      });

      TCF_DATA.links.forEach(link => {
        const key = `${link.source}→${link.target}`;
        const line = edgePaths[key];
        const txt  = edgeLabels[key];
        const isEdgeActive = !active || link.source === active || link.target === active;
        const isDimmed = !!active && !isEdgeActive;

        if (line) {
          line.classList.toggle('dimmed',      isDimmed);
          line.classList.toggle('highlighted', isEdgeActive && !!active);
          line.setAttribute('marker-end',
            isDimmed        ? 'url(#arr-dim)' :
            isEdgeActive && active ? 'url(#arr-hi)' :
                            'url(#arr)');
        }
        if (txt) txt.classList.toggle('dimmed', isDimmed);
      });
    }

    /* ── Panel ─────────────────────────────────────────────────── */
    function showPanel(node) {
      const conn    = connectedIds(node.id);
      const related = TCF_DATA.nodes.filter(n => conn.has(n.id));

      document.getElementById('panel-title').textContent       = node.label;
      document.getElementById('panel-fullname').textContent    = node.fullName;
      document.getElementById('panel-tagline').textContent     = node.tagline;
      document.getElementById('panel-description').textContent = node.description;

      const badge = document.getElementById('panel-badge');
      badge.textContent    = node.status;
      badge.style.color    = node.color;
      badge.style.borderColor = node.color;

      document.getElementById('panel-accent').style.background = node.color;

      document.getElementById('panel-links').innerHTML = (node.links || [])
        .map(l => `<a href="${l.url}" target="_blank" rel="noopener" class="panel-link"
                      style="border-color:${node.color}44;color:${node.color}">${l.label} ↗</a>`)
        .join('');

      const relList = document.getElementById('panel-related-list');
      relList.innerHTML = related
        .map(n => `<button class="related-chip" data-id="${n.id}"
                           style="border-color:${n.color}40">
                     <span class="chip-dot" style="background:${n.color}"></span>${n.label}
                   </button>`)
        .join('');
      relList.querySelectorAll('.related-chip').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const n = TCF_DATA.nodes.find(x => x.id === btn.dataset.id);
          if (n) onSelect(n);
        });
      });

      document.getElementById('panel').setAttribute('aria-hidden', 'false');
      document.getElementById('panel').classList.add('open');
      document.getElementById('hint').style.opacity = '0';
    }

    function closePanel() {
      selectedId = null;
      document.getElementById('panel').setAttribute('aria-hidden', 'true');
      document.getElementById('panel').classList.remove('open');
      render();
    }

    function onSelect(node) {
      selectedId = node.id;
      showPanel(node);
      render();
    }

    document.getElementById('panel-close').addEventListener('click', e => { e.stopPropagation(); closePanel(); });
    document.addEventListener('click',   () => { if (selectedId) closePanel(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

    /* ── Initial render ─────────────────────────────────────── */
    render();

  })();
  </script>
</body>
</html>
